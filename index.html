

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, My Love</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Hero Section -->
    <section class="hero-section" id="home">
        <div class="contains">
            <div class="floating-hearts">
                <div class="class-heart">❤️</div>
                <div class="class-heart">💖</div>
            </div>
            
            <div class="text">
                <!-- "Beautiful" ki jagah "Radha Bitti" likh diya hai yahan -->
                <h1 class="class-title" id="typewriter">Happy Birthday, Radha Bitti!</h1>
                <p class="class-subtitle">Today is all about celebrating you and the joy you bring to my life.</p>
            </div>

            <!-- Photos Grid Section -->
            <div class="photo-gallery">
                <img src="IMG-20260713-WA0001.jpg" class="birthday-img" alt="Photo 1">
                <img src="IMG-20260713-WA0002.jpg" class="birthday-img" alt="Photo 2">
                <img src="IMG-20260713-WA0003.jpg" class="birthday-img" alt="Photo 3">
                <img src="IMG-20260713-WA0004.jpg" class="birthday-img" alt="Photo 4">
                <img src="IMG-20260713-WA0005.jpg" class="birthday-img" alt="Photo 5">
            </div>

            <div class="hearts-row">
                <div class="class-heart">❤️</div>
                <div class="class-heart">💖</div>
                <div class="class-heart">💝</div>
            </div>

            <button class="btn">With Love Forever ✨</button>
        </div>
    </section>

</body>
</html>
